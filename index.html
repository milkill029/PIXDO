<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PIXDO</title>
<link rel="stylesheet" href="PIXDO.css">
</head>
<body>

<!-- ページ全体ドロップ表示 -->
<div id="globalDrop">ここにドロップ</div>

<!-- 初期状態: 画面中央に画像挿入 -->
<div id="uploadArea">
  <div id="dropZone"></div>
  <input type="file" id="fileInput" accept="image/*" style="display:none">
  <h1>PIXDO</h1>
  <div id="uploadPrompt" style="text-align:center;cursor:pointer;">
    <div style="font-size:1rem;color:#aaa;font-weight:bold;letter-spacing:2px;">画像を挿入</div>
    <div style="font-size:0.78rem;color:#555;margin-top:0.4rem;">クリックまたはどこにでもドラッグ＆ドロップ</div>
  </div>
  <div id="fileName"></div>
</div>

<h1 id="mainTitle" style="display:none">PIXDO</h1>

<div id="mainLayout">
  <div id="canvasArea">
    <canvas id="baseCanvas"></canvas>
    <canvas id="revealCanvas"></canvas>
    <canvas id="gridCanvas"></canvas>
    <canvas id="ghostCanvas"></canvas>
    <canvas id="animCanvas"></canvas>
  </div>

  <div id="sidePanel">
    <button id="settingsClose" aria-label="閉じる">✕ 閉じる</button>
    <!-- タブ -->
    <div id="sideTabs">
      <button class="side-tab active" data-page="settings">⚙ 設定</button>
      <button class="side-tab" data-page="animation">✨ アニメーション</button>
    </div>

    <!-- 設定ページ -->
    <div class="side-page" id="pageSettings">
      <!-- 画像変更 -->
      <div id="dropZoneSmall">🔄 画像を変更</div>

      <!-- ドットサイズ -->
      <div id="sizeRow">
        <span>ドットサイズ</span>
        <select id="dotSizeSelect">
          <option value="16">粗め (16px)</option>
          <option value="8" selected>標準 (8px)</option>
          <option value="4">細かめ (4px)</option>
          <option value="2">精細 (2px)</option>
          <option value="1">鬼 (1px)</option>
          <option value="0">原寸</option>
        </select>
      </div>

      <div id="counter"></div>

      <!-- 入力モード選択 -->
      <div id="modeRow" style="display:none; gap:0; align-items:center;">
        <button class="mode-btn active" id="modeTask">✋ 手動</button>
        <button class="mode-btn" id="modeTime">⏱ 時間</button>
      </div>

      <!-- 時間サブモード選択 -->
      <div id="timeSubRow" style="display:none; gap:0; align-items:center;">
        <button class="mode-btn active" id="modeStopwatch">⏱ ストップウォッチ</button>
        <button class="mode-btn" id="modeCountdown">⏲ タイマー</button>
      </div>

      <!-- ストップウォッチ設定パネル -->
      <div id="timePanel">
        <div class="trow">
          <input type="range" id="dotsPerSecRange" min="1" max="100" value="1" step="1">
        </div>
        <div class="tval"><span id="dotsPerSecVal" contenteditable="true" spellcheck="false">1</span> ドット/秒</div>
      </div>

      <!-- タイマー設定パネル -->
      <div id="timerPanel">
        <div class="trow">
          <input type="range" id="timerDotsRange" min="1" max="100" value="1" step="1">
        </div>
        <div class="tval"><span id="timerDotsVal" contenteditable="true" spellcheck="false">1</span> ドット/完了</div>
        <div style="display:flex;align-items:center;gap:0.6rem;">
          <div id="timerCountdown" style="font-size:1.8rem;color:#e8c84a;letter-spacing:3px;font-variant-numeric:tabular-nums;cursor:pointer;user-select:none;">
            <span id="cdHour">00</span>:<span id="cdMin">00</span>:<span id="cdSec">00</span>
          </div>
          <button id="timerResetBtn" title="タイマーをリセット" style="background:transparent;border:1px solid #444;color:#888;border-radius:4px;padding:0.2rem 0.5rem;cursor:pointer;font-size:1rem;">↺</button>
        </div>
        <div id="timerQuickBtns">
          <button class="quick-btn" data-min="10">+10m</button>
          <button class="quick-btn" data-min="30">+30m</button>
          <button class="quick-btn" data-min="60">+1h</button>
        </div>
        <div id="timerCountdownEdit" style="display:none;gap:4px;align-items:center;">
          <input id="cdMinEdit" type="number" min="0" max="999" value="0" style="width:56px;font-size:1.6rem;background:#111;color:#e8c84a;border:none;border-bottom:2px solid #e8c84a;text-align:center;font-variant-numeric:tabular-nums;outline:none;">
          <span style="font-size:1.6rem;color:#e8c84a;">:</span>
          <input id="cdSecEdit" type="number" min="0" max="59" value="0" style="width:56px;font-size:1.6rem;background:#111;color:#e8c84a;border:none;border-bottom:2px solid #e8c84a;text-align:center;font-variant-numeric:tabular-nums;outline:none;">
        </div>
      </div>

      <!-- ストップウォッチ表示 -->
      <div id="timerDisplay">⏱ <span id="timerText">00:00:00</span></div>

      <!-- 塗り順モード -->
      <div id="paintModeRow">
        <button class="mode-btn active" id="modeSeq">順番</button>
        <button class="mode-btn" id="modeRnd">ランダム</button>
      </div>
    </div><!-- /pageSettings -->

    <!-- アニメーションページ -->
    <div class="side-page" id="pageAnimation" style="display:none;">
      <div class="anim-section">
        <label class="anim-toggle-row">
          <span>アニメーション</span>
          <input type="checkbox" id="animEnabled" checked>
        </label>
      </div>
      <div class="anim-section">
        <div class="anim-label">発動頻度</div>
        <div id="animFreqBtns">
          <button class="anim-freq-btn active" data-freq="1">毎回</button>
          <button class="anim-freq-btn" data-freq="0.3">たまに</button>
          <button class="anim-freq-btn" data-freq="0.05">レア</button>
        </div>
      </div>
      <div class="anim-section">
        <div class="anim-label">方向</div>
        <div id="animDirBtns">
          <button class="anim-dir-btn active" data-dir="up">↑</button>
          <button class="anim-dir-btn active" data-dir="down">↓</button>
          <button class="anim-dir-btn active" data-dir="left">←</button>
          <button class="anim-dir-btn active" data-dir="right">→</button>
        </div>
      </div>
      <div class="anim-section">
        <div class="anim-label">スピード</div>
        <input type="range" id="animSpeed" min="100" max="800" value="350" step="50">
        <div class="anim-speed-label"><span id="animSpeedVal">350</span>ms</div>
      </div>
    </div><!-- /pageAnimation -->

    <!-- 常に表示するボタン群 -->
    <div id="btnRow">
      <button id="demoBtn">▶ タスクを完了する</button>
      <div id="subBtnRow">
        <button id="previewBtn">👁 完成形</button>
        <button id="midResetBtn">↺ リセット</button>
      </div>
      <div id="rareNotice" style="display:none;"></div>
    </div>

  </div><!-- /sidePanel -->

<div id="completeModal">
  <h2>🎉 COMPLETE!</h2>
  <canvas id="completeCanvas" title="クリックで閉じる" style="cursor:pointer"></canvas>
  <input type="hidden" id="timerMinInput" value="0">
  <input type="hidden" id="timerSecInput" value="0">
</div>

<button id="fab" aria-label="設定">⚙</button>
<script src="PIXDO.js"></script>
</body>
</html>
